name: Release V0.6.2

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verified main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 0

      - name: Verify release version
        id: version
        shell: bash
        run: |
          version="$(python -c 'from app.constants import APP_VERSION; print(APP_VERSION)')"
          test "$version" = "0.6.2"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        shell: bash
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "$tag already exists; nothing to publish."
            exit 0
          fi
          gh release create "$tag" \
            --target "$TARGET_SHA" \
            --title "bili_workspace ${tag}" \
            --notes-file "docs/V0.6.2_UI发布与验证.md"
