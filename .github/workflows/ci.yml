name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Verify source tree
        run: python tools/verify_source.py

      - name: Compile Python
        run: python -m compileall -q app tests tools docker

      - name: Ruff
        run: python -m ruff check --no-cache app tests tools docker

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q -p no:cacheprovider --tb=short 2>&1 | tee "pytest-${{ matrix.python-version }}.log"

      - name: Upload failed pytest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}-${{ github.run_attempt }}
          path: pytest-${{ matrix.python-version }}.log
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        shell: bash
        run: |
          find web -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Export branch source for agent validation
        uses: actions/upload-artifact@v4
        with:
          name: agent-source-${{ github.sha }}
          path: |
            .
            !.git/**
          include-hidden-files: true
          retention-days: 1

  focused-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Check Markdown internal links
        run: python tools/check_markdown_links.py

      - name: Test SQLite and userdata migrations
        run: >-
          python -m pytest -q -p no:cacheprovider
          tests/test_userdata.py
          tests/test_v05_persistence.py
          tests/test_index_store.py

      - name: Check Windows call chain and Docker configuration
        run: >-
          python -m pytest -q -p no:cacheprovider
          tests/test_integrated_runtime.py
          tests/test_configure_network.py
          tests/test_v05_docker.py
          tests/test_repository_layout.py

  playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Test fixed desktop, tablet, and phone viewports
        env:
          BILI_RUN_PLAYWRIGHT: "1"
        run: >-
          python -m pytest -q -p no:cacheprovider --tb=short
          tests/test_playwright_layout.py
