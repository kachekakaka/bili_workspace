name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build repository audit snapshot
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import zipfile

          raw_paths = subprocess.check_output(["git", "ls-files", "-z"])
          paths = [Path(item.decode("utf-8")) for item in raw_paths.split(b"\0") if item]
          with zipfile.ZipFile("repository-audit.zip", "w", zipfile.ZIP_DEFLATED) as archive:
              for path in paths:
                  if path.match("vendor/windows/*.pack"):
                      continue
                  archive.write(path, path.as_posix())
          Path("repository-audit-files.txt").write_text(
              "\n".join(path.as_posix() for path in paths) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload repository audit snapshot
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit
          path: |
            repository-audit.zip
            repository-audit-files.txt
          retention-days: 1
