name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Record base tree
        shell: bash
        run: |
          git rev-parse HEAD^1^{tree} | tee main-tree-sha.txt
          git ls-tree -r HEAD^1 > main-tree.txt

      - name: Upload base tree metadata
        uses: actions/upload-artifact@v4
        with:
          name: main-tree
          path: |
            main-tree-sha.txt
            main-tree.txt
          retention-days: 1
