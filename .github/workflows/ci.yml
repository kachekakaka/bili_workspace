name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build full repository snapshot
        shell: bash
        run: |
          git archive --format=zip --output=repository-full.zip HEAD
          git ls-files | sort > repository-files.txt

      - name: Upload full repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: repository-full
          path: |
            repository-full.zip
            repository-files.txt
          retention-days: 1
