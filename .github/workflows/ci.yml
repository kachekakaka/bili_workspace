name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
      - name: Verify source tree
        run: python tools/verify_source.py
      - name: Compile Python
        run: python -m compileall -q app tests tools docker
      - name: Ruff
        run: python -m ruff check --no-cache app tests tools docker
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q -p no:cacheprovider --tb=short 2>&1 | tee "pytest-${{ matrix.python-version }}.log"
      - name: Upload failed pytest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}-${{ github.run_attempt }}
          path: pytest-${{ matrix.python-version }}.log
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript and module syntax
        shell: bash
        run: find web -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | sort -z | xargs -0 -n1 node --check
      - name: Run dependency-free frontend module tests
        run: node --test tests/frontend/*.test.mjs

  focused-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
      - name: Check Markdown internal links
        run: python tools/check_markdown_links.py
      - name: Test SQLite, userdata and frontend architecture contracts
        run: >-
          python -m pytest -q -p no:cacheprovider
          tests/test_userdata.py
          tests/test_v05_persistence.py
          tests/test_index_store.py
          tests/test_v060_migrations.py
          tests/test_v060_task_ownership.py
          tests/test_v061_userless_migration.py
          tests/test_v060_release.py
          tests/test_v070_release.py
          tests/test_v062_ui.py
          tests/test_v062_settings_ui.py
          tests/test_v070_frontend_architecture.py
      - name: Check Windows call chain and Docker configuration
        run: >-
          python -m pytest -q -p no:cacheprovider
          tests/test_integrated_runtime.py
          tests/test_configure_network.py
          tests/test_v05_docker.py
          tests/test_repository_layout.py

  playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium
      - name: Test fixed viewports and V0.7 page lifecycles
        env:
          BILI_RUN_PLAYWRIGHT: "1"
        run: >-
          python -m pytest -q -p no:cacheprovider --tb=short
          tests/test_playwright_layout.py
          tests/test_v062_ui_playwright.py
          tests/test_v070_*_playwright.py

  release-validation:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_name == 'main' ||
      github.head_ref == 'release/v0.7.0' ||
      github.head_ref == 'agent/v060-release-validation' ||
      github.head_ref == 'agent/v060-userless-db-migration' ||
      github.head_ref == 'feature/ui-v0.6.2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
      - name: Validate V0.7.0 accounts, ownership, migrations, search and frontend architecture
        run: >-
          python -m pytest -q -p no:cacheprovider --tb=short
          tests/test_v060_accounts.py
          tests/test_v060_auth_sessions.py
          tests/test_v060_auth_races.py
          tests/test_v060_task_ownership.py
          tests/test_v060_migrations.py
          tests/test_v061_userless_migration.py
          tests/test_search_v060.py
          tests/test_v060_release.py
          tests/test_v070_release.py
          tests/test_v062_ui.py
          tests/test_v062_settings_ui.py
          tests/test_v070_frontend_architecture.py

  windows-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_name == 'main' ||
      github.head_ref == 'release/v0.7.0' ||
      github.head_ref == 'agent/v060-release-validation' ||
      github.head_ref == 'agent/v060-userless-db-migration' ||
      github.head_ref == 'feature/ui-v0.6.2'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Clean checkout
        uses: actions/checkout@v4
      - name: Prepare repository-integrated portable runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          cmd.exe /d /c scripts\windows\prepare-runtime.bat -Force 2>&1 |
            Tee-Object -FilePath windows-prepare.log
          $code = $LASTEXITCODE
          if ($code -ne 0) { exit $code }
      - name: Test clean clone and in-place upgrade path
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $env:BILI_VERIFY_NO_PAUSE = "1"
          cmd.exe /d /c verify.bat 2>&1 |
            Tee-Object -FilePath windows-verify.log
          $code = $LASTEXITCODE
          if ($code -ne 0) { exit $code }
      - name: Upload Windows release logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ github.run_attempt }}
          path: |
            windows-prepare.log
            windows-verify.log
          if-no-files-found: warn
          retention-days: 7

  docker-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_name == 'main' ||
      github.head_ref == 'release/v0.7.0' ||
      github.head_ref == 'agent/v060-release-validation' ||
      github.head_ref == 'agent/v060-userless-db-migration' ||
      github.head_ref == 'feature/ui-v0.6.2'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
      - name: Validate Docker persistence and old database upgrade
        run: >-
          python -m pytest -q -p no:cacheprovider --tb=short
          tests/test_v05_docker.py
          tests/test_v060_migrations.py
          tests/test_v060_task_ownership.py::test_v3_to_v4_migration_assigns_admin_without_revoking_sessions
          tests/test_v061_userless_migration.py
          tests/test_v060_release.py
          tests/test_v070_release.py
      - name: Build release image
        run: docker build -f docker/Dockerfile --build-arg TARGETARCH=amd64 -t bili-workspace:v0.7.0 .
      - name: Smoke application version inside image
        run: >-
          docker run --rm --entrypoint python bili-workspace:v0.7.0
          -c "from app import __version__; assert __version__ == '0.7.0'; print(__version__)"
