name: Apply PR3 validated patch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/user-task-ownership-retention'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: agent/user-task-ownership-retention
          fetch-depth: 0

      - name: Apply locally validated changes
        shell: bash
        run: |
          shopt -s nullglob
          parts=(.agent/pr3-final.patch.*)
          if (( ${#parts[@]} != 4 )); then
            echo "Expected four patch parts, found ${#parts[@]}" >&2
            exit 1
          fi
          cat "${parts[@]}" > /tmp/pr3-final.patch
          git apply --check /tmp/pr3-final.patch
          git apply /tmp/pr3-final.patch
          rm -f "${parts[@]}"
          rm -f .github/workflows/apply-pr3-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize V0.6 task ownership and documentation"
          git push origin HEAD:agent/user-task-ownership-retention
