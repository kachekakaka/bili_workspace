name: Build integrated Windows runtime

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - requirements/dev.lock
      - tools/build_integrated_runtime.py
      - scripts/windows/bootstrap-portable.ps1
      - scripts/windows/bootstrap-runtime.bat
      - scripts/windows/prepare-runtime.bat
      - start.bat
      - verify.bat
      - LICENSES/**
      - .github/workflows/build-integrated-runtime.yml

permissions:
  contents: write

concurrency:
  group: integrated-windows-runtime
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up builder Python 3.13.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Build repository runtime packs
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python tools/build_integrated_runtime.py --output vendor/windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem vendor/windows/*-runtime.pack | Format-Table Name,Length

      - name: Test the exact git-pull and start runtime path
        shell: pwsh
        run: |
          cmd /c scripts\windows\prepare-runtime.bat -Force
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $python = Join-Path $PWD '.runtime/python/python.exe'
          & $python tools/verify_source.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $python -m compileall -q app tests tools docker
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $python -m ruff check --no-cache app tests tools docker
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $python -m pytest -q -p no:cacheprovider
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit generated runtime packs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git config http.postBuffer 524288000
          git add -f vendor/windows/python-runtime.pack \
                     vendor/windows/media-runtime.pack \
                     vendor/windows/runtime-manifest.json
          if git diff --cached --quiet; then
            echo 'Integrated runtime is already current.'
            exit 0
          fi
          git commit -m 'Integrate portable Windows runtime v0.5.6 [skip ci]'
          git push origin HEAD:main

      - name: Upload a recovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: bili-workspace-windows-runtime-v0.5.6
          path: |
            vendor/windows/python-runtime.pack
            vendor/windows/media-runtime.pack
            vendor/windows/runtime-manifest.json
          if-no-files-found: error
          retention-days: 30
