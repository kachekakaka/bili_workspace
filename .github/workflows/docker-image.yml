name: Build multi-architecture Docker image
run-name: Build Docker ${{ inputs.release_tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional immutable release tag to publish, for example v0.7.0
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - app/**
      - web/**
      - config/**
      - docker/**
      - docker/Dockerfile
      - docker/compose.yaml
      - requirements/runtime.lock
      - .github/workflows/docker-image.yml
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}-${{ inputs.release_tag || 'source' }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout requested source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Validate optional release tag
        if: inputs.release_tag != ''
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG" --force
          test "$(git rev-parse HEAD)" = "$(git rev-list -n 1 "$RELEASE_TAG")"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kachekakaka/bili_workspace
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=raw,value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=sha

      - name: Build and push amd64/arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
