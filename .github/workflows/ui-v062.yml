name: V0.6.2 UI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-v062-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-v062:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Check JavaScript and module syntax
        shell: bash
        run: |
          find web -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | sort -z | xargs -0 -n1 node --check

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run V0.6.2 UI and V0.7 page lifecycle tests
        env:
          BILI_RUN_PLAYWRIGHT: "1"
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q -p no:cacheprovider --tb=short \
            tests/test_v062_ui.py \
            tests/test_v062_settings_ui.py \
            tests/test_v062_ui_playwright.py \
            tests/test_playwright_layout.py \
            tests/test_v070_tasks_playwright.py \
            tests/test_v070_library_playwright.py 2>&1 | tee v062-playwright.log

      - name: Upload Playwright log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v062-playwright-${{ github.run_attempt }}
          path: v062-playwright.log
          if-no-files-found: warn
          retention-days: 7
