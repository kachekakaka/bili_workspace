name: V0.6.2 UI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-v062-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-v062:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Check JavaScript syntax
        run: node --check web/assets/enhancements-ui-v062.js

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run V0.6.2 UI tests
        env:
          BILI_RUN_PLAYWRIGHT: "1"
        run: >-
          python -m pytest -q -p no:cacheprovider --tb=short
          tests/test_v062_ui.py
          tests/test_v062_ui_playwright.py
