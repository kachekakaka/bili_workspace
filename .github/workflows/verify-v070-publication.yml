name: Verify V0.7.0 Publication

on:
  pull_request:
    paths:
      - .github/workflows/verify-v070-publication.yml

permissions:
  contents: read
  packages: read

concurrency:
  group: verify-v070-publication-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publication:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify GitHub Release and immutable tag
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: 1821d67377c3cc416e3f75e9092000c85872bd1c
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --tags --force
          main_sha="$(git rev-parse origin/main)"
          tag_sha="$(git rev-list -n 1 v0.7.0)"
          test "$tag_sha" = "$EXPECTED_SHA"
          git merge-base --is-ancestor "$EXPECTED_SHA" "$main_sha"
          test "$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/v0.7.0 --jq .tag_name)" = "v0.7.0"
          test "$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/v0.7.0 --jq .name)" = "bili_workspace v0.7.0"
          test "$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/v0.7.0 --jq .draft)" = "false"
          test "$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/v0.7.0 --jq .prerelease)" = "false"
          gh release view v0.7.0 --repo "$GITHUB_REPOSITORY" --json tagName,name,targetCommitish,url

      - name: Verify published multi-architecture GHCR image
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          image="ghcr.io/kachekakaka/bili_workspace:v0.7.0"
          for attempt in $(seq 1 60); do
            if docker buildx imagetools inspect "$image" > manifest.txt 2>&1; then
              cat manifest.txt
              grep -q 'linux/amd64' manifest.txt
              grep -q 'linux/arm64' manifest.txt
              exit 0
            fi
            echo "等待多架构镜像发布（${attempt}/60）"
            sleep 20
          done
          cat manifest.txt || true
          exit 1
