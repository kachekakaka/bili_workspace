name: Apply V0.6.1 release metadata

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: v061-release-metadata
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/v060-userless-db-migration'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: agent/v060-userless-db-migration
          fetch-depth: 0
      - name: Synchronize V0.6.1 metadata
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'README.md': [('# bili_workspace v0.6.0', '# bili_workspace v0.6.1')],
              'docs/README.md': [('当前应用版本为 V0.6.0', '当前应用版本为 V0.6.1')],
              'start.bat': [('bili_workspace v0.6.0', 'bili_workspace v0.6.1')],
              'verify.bat': [
                  ('bili_workspace v0.6.0', 'bili_workspace v0.6.1'),
                  ('v0.6.0 自检全部通过', 'v0.6.1 自检全部通过'),
              ],
              'scripts/dev/verify-source.sh': [
                  ('bili_workspace v0.6.0 源码自检完成', 'bili_workspace v0.6.1 源码自检完成')
              ],
              'tests/test_v060_release.py': [
                  ('APP_VERSION == "0.6.0"', 'APP_VERSION == "0.6.1"'),
                  ('# bili_workspace v0.6.0', '# bili_workspace v0.6.1'),
                  ('## 0.6.0 - 2026-07-20', '## 0.6.1 - 2026-07-20'),
                  ('bili_workspace v0.6.0', 'bili_workspace v0.6.1'),
                  ('v0.6.0 自检全部通过', 'v0.6.1 自检全部通过'),
              ],
          }
          for name, pairs in replacements.items():
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              for old, new in pairs:
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          if '## 0.6.1 - 2026-07-20' not in text:
              marker = '本项目遵循语义化版本号。\n\n'
              section = (
                  '## 0.6.1 - 2026-07-20\n\n'
                  '- 修复本机 V0.5 schema v2 数据库中 `users` 表为空时，'
                  'V0.6 任务所有权迁移因找不到管理员而回滚的问题；\n'
                  '- 迁移这类旧库时在同一事务内创建受限临时管理员 '
                  '`admin / 123456`，强制首次改密，并把既有任务和导出归属该管理员；\n'
                  '- 保留迁移前一致性备份、事务回滚、外键检查和远程默认密码限制。\n\n'
              )
              if marker not in text:
                  raise SystemExit('CHANGELOG header not found')
              text = text.replace(marker, marker + section, 1)
              changelog.write_text(text, encoding='utf-8')

          ci_path = Path('.github/workflows/ci.yml')
          ci = ci_path.read_text(encoding='utf-8')
          old = "github.head_ref == 'agent/v060-release-validation'"
          new = (
              "github.head_ref == 'agent/v060-release-validation' || "
              "github.head_ref == 'agent/v060-userless-db-migration'"
          )
          ci = ci.replace(old, new)
          if 'tests/test_v061_userless_migration.py' not in ci:
              focused = '          tests/test_v060_task_ownership.py\n'
              ci = ci.replace(
                  focused,
                  focused + '          tests/test_v061_userless_migration.py\n',
                  1,
              )
              release = '          tests/test_v060_release.py\n'
              position = ci.rfind(release)
              if position < 0:
                  raise SystemExit('release validation marker not found')
              position += len(release)
              ci = ci[:position] + '          tests/test_v061_userless_migration.py\n' + ci[position:]
          ci_path.write_text(ci, encoding='utf-8')
          PY

          rm -f .github/workflows/apply-v061-metadata.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Document V0.6.1 migration hotfix"
          git push origin HEAD:agent/v060-userless-db-migration
