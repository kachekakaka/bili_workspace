name: Apply PR4 validated patch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/multi-user-frontend'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: agent/multi-user-frontend
          fetch-depth: 0

      - name: Apply verified PR4 implementation
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.agent/pr4-final.patch.gz.b64.*)
          test "${#parts[@]}" -eq 18
          cat "${parts[@]}" | tr -d '\r\n' > /tmp/pr4-final.patch.gz.b64
          echo "ab9a0dfca53c8e17b0acd17f5b25df8169c503330d8567e100c2d1e13fcca939  /tmp/pr4-final.patch.gz.b64" | sha256sum -c -
          base64 --decode /tmp/pr4-final.patch.gz.b64 > /tmp/pr4-final.patch.gz
          echo "4cfe9058a0bf061336a80c14fed01c4bfea9deb85883ccccd0354c8d0e0194b6  /tmp/pr4-final.patch.gz" | sha256sum -c -
          gzip -dc /tmp/pr4-final.patch.gz > /tmp/pr4-final.patch
          echo "78d54c6c3390484325aa84e6786293d240f6a674e64887f8470d339a313cf6ae  /tmp/pr4-final.patch" | sha256sum -c -
          git apply --check /tmp/pr4-final.patch
          git apply /tmp/pr4-final.patch
          rm -rf .agent
          rm -f .github/workflows/apply-pr4-patch.yml
          rm -f .github/workflows/agent-source-export-pr4.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement V0.6 multi-user frontend"
          git push origin "HEAD:agent/multi-user-frontend"
