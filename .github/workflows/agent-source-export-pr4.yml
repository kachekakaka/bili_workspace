name: Export PR4 branch source

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  export-source:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/multi-user-frontend'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: agent/multi-user-frontend
          fetch-depth: 0
      - name: Upload branch source
        uses: actions/upload-artifact@v4
        with:
          name: pr4-branch-source-${{ github.sha }}
          path: |
            .
            !.git/**
          include-hidden-files: true
          retention-days: 1
