name: bili-workspace

services:
  app:
    image: "${BILI_IMAGE:-ghcr.io/kachekakaka/bili_workspace:latest}"
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${BIND_IP:-0.0.0.0}:${HTTP_PORT:-3398}:3398"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      BILI_APP_MODE: docker
      BILI_CONFIG_DIR: /data/config
      BILI_USERDATA_DIR: /data/userdata
      BILI_DATABASE_PATH: /data/userdata/bili_workspace.db
      BILI_MEDIA_DIR: /downloads
      BILI_CACHE_DIR: /data/userdata/cache
      BILI_TEMP_DIR: /data/userdata/tmp
      BILI_BBDOWN_DIR: /data/config/bbdown
      BILI_HOST: 0.0.0.0
      BILI_PORT: 3398
      BILI_AUTH_REQUIRED: "true"
      HOME: /data/userdata/home
      XDG_CACHE_HOME: /data/userdata/cache
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: /data/userdata/cache/dotnet
      TMPDIR: /data/userdata/tmp
      BILI_PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      BILI_TRUSTED_HOSTS: "${TRUSTED_HOSTS:-127.0.0.1,localhost}"
      BILI_TRUSTED_PROXY_IPS: "${TRUSTED_PROXY_IPS:-127.0.0.1}"
      BILI_COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      BILI_HSTS: "${ENABLE_HSTS:-false}"
      BILI_BOOTSTRAP_TOKEN: "${BOOTSTRAP_TOKEN:-}"
      BILI_EXPORT_TTL_SEC: "${EXPORT_TTL_SEC:-86400}"
      BILI_MIN_FREE_GIB: "${MIN_FREE_GIB:-2}"
      BILI_DOWNLOAD_CONCURRENCY: "${DOWNLOAD_CONCURRENCY:-1}"
      BILI_TRANSCODE_THREADS: "${TRANSCODE_THREADS:-0}"
    volumes:
      - type: bind
        source: "${CONFIG_DIR:-./config}"
        target: /data/config
      - type: bind
        source: "${USERDATA_DIR:-./userdata}"
        target: /data/userdata
      - type: bind
        source: "${MEDIA_DIR:-./downloads}"
        target: /downloads
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD", "python", "/app/docker/healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
